[versioneer]
VCS = git
style = pep440-post
versionfile_source = bluesky_queueserver/_version.py
versionfile_build = bluesky_queueserver/_version.py
tag_prefix = v

[tool:pytest]
# Unified test discovery for the merged queueserver + httpserver package.
# A single `pytest` run from the repo root collects both suites:
#   - bluesky_queueserver/...            (manager + cli tests)
#   - subprojects/bluesky-httpserver/... (the packaged httpserver subproject)
# The httpserver test fixtures already build on the queueserver test harness
# (see subprojects/bluesky-httpserver/bluesky_httpserver/tests/conftest.py).
testpaths =
    bluesky_queueserver
    subprojects/bluesky-httpserver/bluesky_httpserver
# Never collect from the stale, untracked top-level `bluesky-httpserver/` copy
# (the canonical package lives under subprojects/); collecting both would import
# two modules named `bluesky_httpserver` and abort with an import-file mismatch.
norecursedirs =
    bluesky-httpserver
    .git
    build
    dist
    *.egg-info
