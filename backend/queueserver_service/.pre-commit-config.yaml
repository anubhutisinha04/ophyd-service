# Self-contained lint gate for queueserver_service.
#
# queueserver_service is a large in-tree fork of bluesky-queueserver /
# bluesky-httpserver and keeps its OWN lint conventions — it is intentionally
# excluded from the monorepo's shared lint tooling (the root
# .pre-commit-config.yaml and the CI lint workflow, which gate only the other
# two backends). This local config is that convention: ruff, pinned to the same
# version the rest of the repo uses, scoped to only the modules this repo
# maintains in-tree (not the vendored bulk, and not the vendored docs /
# .test_durations that unscoped hygiene hooks would otherwise rewrite).
#
# The ruleset lives in this directory's pyproject.toml ([tool.ruff]); ruff
# auto-discovers it from each linted file, so this works whether pre-commit is
# run from the monorepo root or from within backend/queueserver_service.
#
# Run just this gate:
#   pre-commit run --all-files -c backend/queueserver_service/.pre-commit-config.yaml

default_language_version:
  python: python3

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7 # keep in sync with the monorepo root .pre-commit-config.yaml
    hooks:
      - id: ruff
        name: ruff (queueserver_service, in-tree modules)
        # Only the modules maintained in-tree by this fork. Add new in-tree
        # modules here as they are created. The `(^|/)` prefix matches both
        # monorepo-root and subproject-root invocations.
        files: >-
          (^|/)queueserver_service/(manager/(config_service|queue_store|http_server)|http/routers/profile_collection)\.py$
