# Unified unit tests for the merged package: a single pytest run collects both
# the bluesky_queueserver suite and the packaged bluesky-httpserver suite
# (see testpaths in setup.cfg). Redis is provided by the setup-redis action;
# LDAP for the httpserver authenticator tests is provided by the openldap
# service container below.
name: Unit Tests

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-latest
    # LDAP server for the httpserver LDAPAuthenticator tests
    # (subprojects/bluesky-httpserver/.../test_authenticators.py connects to
    # localhost:1389 with these users). The container starts at job start; the
    # heavy install step below gives it ample time to be ready before tests run.
    services:
      # Bitnami removed the public `bitnami/openldap` images from Docker Hub in
      # 2025 and relocated them to the `bitnamilegacy/` namespace; the old
      # `bitnami/openldap:latest` tag no longer resolves. `bitnamilegacy` is the
      # same image (same env vars / user bootstrap), verified to satisfy
      # test_authenticators.py with the users below.
      openldap:
        image: bitnamilegacy/openldap:latest
        ports:
          - '1389:1389'
          - '1636:1636'
        env:
          LDAP_ADMIN_USERNAME: admin
          LDAP_ADMIN_PASSWORD: adminpassword
          LDAP_USERS: user01,user02
          LDAP_PASSWORDS: password1,password2
    strategy:
      matrix:
        use-ipykernel: [false, true]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        zmq-encoding: ["json", "msgpack"]
        # pydantic-version: ["<2.0.0", ">=2.0.0"]
        group: [1, 2, 3]
        exclude:
          - python-version: "3.10"
            zmq-encoding: "msgpack"
          - python-version: "3.11"
            zmq-encoding: "msgpack"
          - python-version: "3.13"
            zmq-encoding: "msgpack"
        #   - python-version: "3.9"
        #     pydantic-version: "<2.0.0"
        #   - python-version: "3.10"
        #     pydantic-version: "<2.0.0"
        #   - python-version: "3.12"
        #     pydantic-version: "<2.0.0"
      fail-fast: false

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    - uses: shogo82148/actions-setup-redis@v1
      with:
        redis-version: "7.x"
    - name: Install dependencies
      run: |
        # sudo apt install redis

        # These packages are installed in the base environment but may be older
        # versions. Explicitly upgrade them because they often create
        # installation problems if out of date.
        python -m pip install --upgrade pip setuptools numpy

        pip install .
        pip install -r requirements-dev.txt
        # pip install "pydantic${{ matrix.pydantic-version }}"
        # pip install bluesky==1.13.1

        pip list
    - name: Test with pytest
      env:
        USE_IPYKERNEL: ${{ matrix.use-ipykernel }}
        USE_ZMQ_ENCODING: ${{ matrix.zmq-encoding }}
      run: |
        # pytest -k test_ip_kernel_func -vvv
        # NOTE: .test_durations does not yet include the httpserver tests, so
        # pytest-split estimates their durations and the 3 groups may be a bit
        # uneven. Regenerate via store_test_durations.sh once the merged suite
        # runs green in CI.
        coverage run -m pytest -vv --splits 3 --group ${{ matrix.group }}
        coverage report -m
