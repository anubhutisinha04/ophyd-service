version: '2'

services:
  openldap:
    # bitnami removed the public bitnami/openldap images from Docker Hub in 2025;
    # the same image now lives under the bitnamilegacy/ namespace.
    image: docker.io/bitnamilegacy/openldap:latest
    ports:
      - '1389:1389'
      - '1636:1636'
    environment:
      - LDAP_ADMIN_USERNAME=admin
      - LDAP_ADMIN_PASSWORD=adminpassword
      - LDAP_USERS=user01,user02
      - LDAP_PASSWORDS=password1,password2
    volumes:
      - 'openldap_data:/bitnami/openldap'

volumes:
  openldap_data:
    driver: local
