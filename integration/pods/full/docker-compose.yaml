# Full integration pod for ophyd-service.
#
# Sibling to integration/pods/minimal/. Adds extra caproto IOCs so the
# happi-loaded device registry has more shapes to exercise:
#
#   ioc                — caproto.ioc_examples.mini_beamline (mini:*)
#   ioc_random_walk    — caproto.ioc_examples.random_walk (random_walk:*)
#   ioc_random_walk_h  — caproto.ioc_examples.random_walk (random_walk:horiz-*)
#   ioc_random_walk_v  — caproto.ioc_examples.random_walk (random_walk:vert-*)
#   ioc_thermo         — caproto.ioc_examples.thermo_sim (thermo:*)
#   ioc_fake_motor     — caproto.ioc_examples.fake_motor_record (sim:mtr1/2/3, full motor records)
#   ioc_adsim          — custom ioc_adsim.py: simulated AreaDetector (13SIM1:cam1:* + live
#                        13SIM1:image1:ArrayData) for the camera-socket / tiff-socket
#   configuration_service / direct_control_service — same images as minimal
#
# Devices the registry knows about by default (from happi_db.json): spot,
# pinhole, edge, slit, plus mini_beamline motor scalars and compound leaves.
# Devices for ioc_random_walk[_h|_v], ioc_thermo, and ioc_fake_motor are NOT
# pre-seeded — they exist to be added at runtime via the configuration_service
# CRUD endpoints (see integration/happi/runtime_seed.json for ready-to-paste
# request bodies).
#
# All six IOCs build from the same image at integration/ioc/Dockerfile;
# different `command:` overrides choose which caproto module + prefix runs.
#
# Usage:
#   docker compose up --build                      # backends only (no frontend)
#   docker compose --profile frontend up --build   # include the frontend UI
#   docker compose down
#   docker compose logs ioc_random_walk

x-ioc-base: &ioc-base
  build:
    context: ../../ioc

services:
  ioc:
    <<: *ioc-base
    command: ["python", "-m", "caproto.ioc_examples.mini_beamline", "--list-pvs", "--interfaces", "0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f caproto.ioc_examples.mini_beamline > /dev/null"]
      interval: 5s
      timeout: 2s
      retries: 10

  ioc_random_walk:
    <<: *ioc-base
    command: ["python", "-m", "caproto.ioc_examples.random_walk", "--list-pvs", "--interfaces", "0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f caproto.ioc_examples.random_walk > /dev/null"]
      interval: 5s
      timeout: 2s
      retries: 10

  ioc_random_walk_h:
    <<: *ioc-base
    command: ["python", "-m", "caproto.ioc_examples.random_walk", "--list-pvs", "--interfaces", "0.0.0.0", "--prefix", "random_walk:horiz-"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'random_walk.*horiz-' > /dev/null"]
      interval: 5s
      timeout: 2s
      retries: 10

  ioc_random_walk_v:
    <<: *ioc-base
    command: ["python", "-m", "caproto.ioc_examples.random_walk", "--list-pvs", "--interfaces", "0.0.0.0", "--prefix", "random_walk:vert-"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'random_walk.*vert-' > /dev/null"]
      interval: 5s
      timeout: 2s
      retries: 10

  ioc_thermo:
    <<: *ioc-base
    command: ["python", "-m", "caproto.ioc_examples.thermo_sim", "--list-pvs", "--interfaces", "0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f caproto.ioc_examples.thermo_sim > /dev/null"]
      interval: 5s
      timeout: 2s
      retries: 10

  ioc_fake_motor:
    <<: *ioc-base
    command: ["python", "-m", "caproto.ioc_examples.fake_motor_record", "--list-pvs", "--interfaces", "0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f caproto.ioc_examples.fake_motor_record > /dev/null"]
      interval: 5s
      timeout: 2s
      retries: 10

  ioc_adsim:
    <<: *ioc-base
    command: ["python", "/app/ioc_adsim.py", "--list-pvs", "--interfaces", "0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f ioc_adsim.py > /dev/null"]
      interval: 5s
      timeout: 2s
      retries: 10

  postgres:
    image: docker.io/postgres:16
    environment:
      POSTGRES_USER: bluesky
      POSTGRES_PASSWORD: bluesky
      POSTGRES_DB: config_service
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bluesky"]
      interval: 5s
      timeout: 3s
      retries: 10

  configuration_service:
    build:
      context: ../../../backend/configuration_service
    environment:
      CONFIG_LOAD_STRATEGY: "happi"
      CONFIG_PROFILE_PATH: "/profile"
      # PostgreSQL persistence (config_service also supports SQLite; this pod uses Postgres).
      CONFIG_DATABASE_URL: "postgresql+psycopg://bluesky:bluesky@postgres:5432/config_service"
      # The happi DB references compound device classes (localdevs.Det,
      # localdevs.Spot). Loader walks those classes to index sub-PVs at
      # registry-load time, so the module must be importable. Falls back
      # to prefix-only indexing with a warning if the import fails.
      PYTHONPATH: "/localdevs"
    volumes:
      - ../../happi:/profile:ro
      - ../../localdevs:/localdevs:ro
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy

  direct_control_service:
    build:
      context: ../../../backend/direct_control_service
    environment:
      DIRECT_CONTROL_CONFIGURATION_SERVICE_URL: http://configuration_service:8004
      DIRECT_CONTROL_COORDINATION_CHECK_ENABLED: "false"
      # Enable control: read-only defaults to true (monitor-only); the
      # exerciser does PV writes, so this integration pod allows them.
      DIRECT_CONTROL_GLOBAL_READ_ONLY: "false"
      # pyepics: list every IOC service so CA search reaches them all on the
      # compose network. Disable broadcast — explicit list keeps stray
      # search requests from leaving the docker net.
      EPICS_CA_ADDR_LIST: "ioc ioc_random_walk ioc_random_walk_h ioc_random_walk_v ioc_thermo ioc_fake_motor ioc_adsim"
      EPICS_CA_AUTO_ADDR_LIST: "NO"
      # Device-level control (/api/v1/device/execute) instantiates the
      # registry's device classes in THIS container; the happi DB references
      # compound classes localdevs.Det / localdevs.Spot.
      PYTHONPATH: "/localdevs"
    volumes:
      - ../../localdevs:/localdevs:ro
    ports:
      - "8003:8003"
    depends_on:
      configuration_service:
        condition: service_healthy
      ioc:
        condition: service_healthy
      ioc_random_walk:
        condition: service_healthy
      ioc_random_walk_h:
        condition: service_healthy
      ioc_random_walk_v:
        condition: service_healthy
      ioc_thermo:
        condition: service_healthy
      ioc_fake_motor:
        condition: service_healthy
      ioc_adsim:
        condition: service_healthy

  # The frontend is owned by the frontend team and is NOT exercised by this
  # pod's end-to-end checks (they only hit the backends on 8003/8004). It is
  # gated behind the "frontend" compose profile so a frontend-team build change
  # cannot break the backend/integration CI. Bring it up explicitly with:
  #   docker compose --profile frontend up --build
  frontend:
    profiles: ["frontend"]
    build:
      context: ../../../frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ../../../frontend:/app
      - /app/node_modules
    depends_on:
      direct_control_service:
        condition: service_healthy
