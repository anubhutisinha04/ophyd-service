# End-to-end integration test for the ophyd-service backends.
#
# Two pods, one job each:
#   - `full`: 5 caproto IOCs + configuration_service + direct_control_service,
#     driven by every exerciser under integration/exercise/.
#   - `with-queueserver`: IOC + redis + all three backends; its smoke.sh covers
#     the Side-B edge (queueserver <-> config-service env-open sync, consume-mode
#     device injection, websocket streaming).
# Each script exits non-zero on any assertion miss, so the workflow fails
# fast on contract drift.
#
# Triggers:
#   - every PR (catches breakage before merge)
#   - every push to main (catches drift between merge and main HEAD)
#   - manual via workflow_dispatch
#
# Why `full` and not `minimal`/`dev`:
#   - `full` exercises everything `minimal` does plus 4 more IOCs
#     (random_walk ×3, thermo_sim) — strictly more coverage.
#   - `dev` only adds a frontend container, which is the frontend team's
#     CI scope, not ours.
#
# Runtime: ~5 min per run (build ~3min + wait ~30s + exercisers ~30s + teardown).
# Free for public repos.

name: integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  full-pod:
    name: full pod end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Bring up the full pod
        working-directory: integration/pods/full
        run: docker compose up --build -d

      - name: Wait for backends to be healthy
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8004/health >/dev/null \
               && curl -sf http://localhost:8003/health >/dev/null; then
              echo "both backends healthy after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "backends did not become healthy within 120s" >&2
          exit 1

      - name: Exercise configuration_service
        run: ./integration/exercise/configuration_service.sh

      - name: Exercise direct_control HTTP surface
        run: ./integration/exercise/direct_control.sh

      - name: Exercise direct_control WebSocket
        # Default PV (mini:current) is in the happi seed and ticks on every
        # pod. Don't use random_walk:x here — it's CRUD-added by the next
        # step (registry_roundtrip), so it's not in the registry yet.
        run: |
          python -m pip install --upgrade pip
          pip install --no-input websockets
          python integration/exercise/direct_control_ws.py

      - name: Exercise registry round-trip (CRUD-extend → export → re-import)
        run: ./integration/exercise/registry_roundtrip.sh

      - name: Dump container logs on failure
        if: failure()
        working-directory: integration/pods/full
        run: |
          echo "::group::compose ps"
          docker compose ps
          echo "::endgroup::"
          echo "::group::compose logs"
          docker compose logs --tail=200
          echo "::endgroup::"

      - name: Tear down the pod
        if: always()
        working-directory: integration/pods/full
        run: docker compose down --volumes

  with-queueserver-pod:
    name: with-queueserver pod Side-B end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        shell: bash
        working-directory: integration/pods/with-queueserver

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Bring up the with-queueserver pod
        run: docker compose up --build -d

      - name: Wait for the unified queueserver to answer
        run: |
          for i in $(seq 1 60); do
            if curl -sf -H "Authorization: ApiKey mad" http://localhost:60610/api/status >/dev/null; then
              echo "queueserver answering after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "queueserver did not answer within 120s" >&2
          exit 1

      - name: Run Side-B smoke (env-open sync, consume-mode injection, websockets)
        run: ./smoke.sh

      - name: Exercise bluesky-queueserver-api compatibility
        # The PyPI client package is the frozen public contract: the in-tree
        # queueserver_service may diverge from upstream bluesky-queueserver,
        # but whatever bluesky-queueserver-api consumes (0MQ protocol +
        # HTTP/WS API) must keep working. See the service README.
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          pip install --no-input bluesky-queueserver-api
          python integration/exercise/queueserver_api_compat.py

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::compose ps"
          docker compose ps
          echo "::endgroup::"
          echo "::group::compose logs"
          docker compose logs --tail=200
          echo "::endgroup::"

      - name: Tear down the pod
        if: always()
        run: docker compose down --volumes
