# Unit-test the ophyd-service backends.
#
# Three parallel jobs. The two per-backend jobs run that backend's full
# pytest suite, respecting its coverage gate from pyproject.toml
# (--cov-fail-under=60 for direct_control, =75 for configuration_service).
# The third job covers the Side-B edge (queueserver <-> configuration_service):
# it runs the queueserver's config-service client tests against the REAL
# config-service app booted in-process — NOT the full 2868-test queueserver
# suite, which needs redis + LDAP and stays in the queueserver repo's own CI.
#
# Triggers:
#   - every PR
#   - every push to main
#   - manual via workflow_dispatch
#
# Why parallel jobs (not a matrix): clearer failure attribution, and
# the two backends use different dep-extra formats:
#   - direct_control: [project.optional-dependencies] dev = [...]
#   - configuration_service: [dependency-groups] dev = [...] (PEP 735)
#
# Runtime: ~2 min per job.

name: unit-tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  direct-control-tests:
    name: direct_control_service pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        shell: bash
        working-directory: backend/direct_control_service

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/direct_control_service/pyproject.toml

      - name: Install backend + dev deps
        run: |
          python -m pip install --upgrade pip
          # Install direct-control and the sibling configuration_service in a
          # SINGLE pip invocation so the resolver reconciles their shared
          # dependencies in one pass. Two separate `pip install -e` calls resolve
          # independently and the second can silently downgrade a shared package
          # (e.g. pydantic) the first relies on. config-service is needed because
          # the Side-A integration tests boot it in-process; it is not on PyPI
          # (sibling monorepo package), so it is installed from its path. The
          # tests importorskip() it, so without it they would skip.
          pip install -e ".[dev]" -e ../configuration_service
          pip install epicscorelibs

      - name: Run pytest
        run: pytest

  configuration-service-tests:
    name: configuration_service pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # configuration_service supports SQLite and PostgreSQL; the test suite is
    # parametrized over both. The SQLite half needs nothing; the PostgreSQL half
    # connects via TEST_DATABASE_URL (set on the pytest step below) to this
    # service container.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bluesky
          POSTGRES_PASSWORD: bluesky
          POSTGRES_DB: config_service
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bluesky"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        shell: bash
        working-directory: backend/configuration_service

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/configuration_service/pyproject.toml

      - name: Install backend + dev deps
        # PEP 735 [dependency-groups] requires pip 25.1+ for --group.
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install --group dev

      - name: Run pytest
        env:
          TEST_DATABASE_URL: postgresql+psycopg://bluesky:bluesky@localhost:5432/config_service
        run: pytest

  queueserver-config-edge-tests:
    name: queueserver <-> configuration_service edge pytest (Side-B)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        shell: bash
        working-directory: backend/queueserver_service

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/queueserver_service/requirements.txt

      - name: Install queueserver + sibling configuration_service
        # Single pip invocation so the resolver reconciles shared deps in one
        # pass (same rationale as the direct-control job above). config-service
        # is not on PyPI; the edge tests boot its real FastAPI app in-process
        # (httpx.ASGITransport + asgi-lifespan) and importorskip() it, so
        # without it they would silently skip.
        run: |
          python -m pip install --upgrade pip
          pip install -e . -e ../configuration_service asgi-lifespan pytest pytest-asyncio

      - name: Run Side-B edge tests
        run: |
          pytest -v \
            bluesky_queueserver/manager/tests/test_config_service.py \
            bluesky_queueserver/manager/tests/test_config_service_integration.py
